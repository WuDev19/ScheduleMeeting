services:

  postgres-db:
    image: postgres:16
    container_name: postgres-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=schedule_meeting
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Anhvu197@
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - schedule-meeting-network

  redis-cache:
    image: redis:7.2-alpine
    container_name: redis-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./backend/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass Anhvu197@
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "Anhvu197@", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - schedule-meeting-network

  backend:
    build: ./backend
    container_name: schedule-meeting-be
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - DB_NAME_POSTGRES=schedule_meeting
      - DB_USER=postgres
      - DB_PASSWORD=Anhvu197@
      - DB_HOST_POSTGRES=postgres-db
      - REDIS_HOST=redis-cache
      - REDIS_PASS=Anhvu197@
      - APP_EMAIL=noreplyemail109339@gmail.com
      - APP_EMAIL_PASSWORD=obdkvgiknyvjiuym
      - JWT_SECRET_KEY=87c63f5d838e678bf5fc1a8a9cfa91c51fd7abdb3496bf7819b6aea6b82f3e47
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=Aa123456@
      - ADMIN_EMAIL=nguyenvu19a19@gmail.com
      - CLOUDINARY_NAME=dliphskfl
      - CLOUDINARY_API_KEY=685271726522585
      - CLOUDINARY_SECRET_KEY=Jh6aouHDxKUDVvRQDipYW9dIBbU
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    networks:
      - schedule-meeting-network
  
  front-end:
    build: ./frontend
    container_name: schedule-meeting-fe
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on: 
      - backend
    networks:
      - schedule-meeting-network

volumes:
  postgres_data:
  redis_data:

networks:
  schedule-meeting-network:
    driver: bridge